<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <!-- 适配 iOS 刘海屏及禁止缩放 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <!-- 将网页添加到 iOS 主屏幕时表现为原生 App -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="format-detection" content="telephone=no">
    <title>入党考试</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        body {
            -webkit-tap-highlight-color: transparent;
            -webkit-text-size-adjust: 100%; /* 防止 iOS 横屏或默认自动放大字体 */
            touch-action: manipulation;
            /* 优先使用苹果系统默认中文字体 PingFang SC */
            font-family: -apple-system, "PingFang SC", "Microsoft YaHei", BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f8fafc;
        }
        .fade-in { animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        .rich-text-wrapper { line-height: 1.6; word-wrap: break-word; }
        .rich-text-wrapper span { line-height: inherit; }

        /* 炫酷的页面切换动画 */
        .slide-out-tl { animation: slideOutTl 0.3s cubic-bezier(0.4, 0, 0.2, 1) forwards; }
        .slide-in-br { animation: slideInBr 0.3s cubic-bezier(0.4, 0, 0.2, 1) forwards; }
        @keyframes slideOutTl { to { transform: translate(-30%, -30%) scale(0.9); opacity: 0; } }
        @keyframes slideInBr { from { transform: translate(30%, 30%) scale(0.9); opacity: 0; } to { transform: translate(0, 0) scale(1); opacity: 1; } }

        .slide-out-left { animation: slideOutLeft 0.3s cubic-bezier(0.4, 0, 0.2, 1) forwards; }
        .slide-in-right { animation: slideInRight 0.3s cubic-bezier(0.4, 0, 0.2, 1) forwards; }
        @keyframes slideOutLeft { to { transform: translateX(-50%); opacity: 0; } }
        @keyframes slideInRight { from { transform: translateX(50%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

        .slide-out-right { animation: slideOutRight 0.3s cubic-bezier(0.4, 0, 0.2, 1) forwards; }
        .slide-in-left { animation: slideInLeft 0.3s cubic-bezier(0.4, 0, 0.2, 1) forwards; }
        @keyframes slideOutRight { to { transform: translateX(50%); opacity: 0; } }
        @keyframes slideInLeft { from { transform: translateX(-50%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

        .glass-card { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05); }
        
        /* 自动加载动画 */
        .sync-spin { animation: spin 2s linear infinite; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="text-slate-800 h-screen overflow-hidden flex flex-col items-center">

    <!-- 主容器 -->
    <div class="w-full max-w-md h-full bg-white shadow-2xl relative flex flex-col no-scrollbar overflow-hidden">
        
        <!-- 头部导航栏 -->
        <header class="bg-red-800 text-white p-4 shadow-md sticky top-0 z-20 flex justify-between items-center">
            <div class="flex items-center">
                <button id="btn-back" onclick="confirmReturnHome()" class="hidden mr-3 active:scale-95 text-red-200 hover:text-white transition-colors">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M15 19l-7-7 7-7"></path></svg>
                </button>
                <h1 class="text-xl font-black tracking-widest text-yellow-400">党旗飘飘</h1>
            </div>
            
            <div class="flex items-center gap-4">
                <div id="header-stats" class="hidden text-xs font-bold bg-red-900 px-3 py-1 rounded-full border border-red-700">
                    <span id="header-progress">1/10</span>
                </div>
                <!-- 错题本入口 Icon (带红点) -->
                <button onclick="startQuiz('mistakes')" class="relative active:scale-95 transition-transform" id="nav-mistake-btn">
                    <svg class="w-6 h-6 text-red-100" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"></path></svg>
                    <span id="mistake-badge" class="absolute -top-1.5 -right-1.5 bg-yellow-400 text-red-900 text-[10px] font-black w-4 h-4 flex items-center justify-center rounded-full border border-red-800 hidden">0</span>
                </button>
                <!-- 设置入口 Icon -->
                <button onclick="openSettings()" class="active:scale-95 transition-transform">
                    <svg class="w-5 h-5 text-red-200" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
                </button>
            </div>
        </header>

        <!-- 视图 1：首页看板 -->
        <div id="view-home" class="flex-1 flex flex-col p-5 overflow-y-auto fade-in bg-slate-50">
            
            <!-- 进度看板 -->
            <div class="bg-red-700 rounded-2xl p-6 text-white shadow-lg mb-6 relative overflow-hidden">
                <div class="absolute -right-4 -top-4 w-24 h-24 bg-red-600 rounded-full blur-2xl"></div>
                <h2 class="text-sm font-bold text-red-100 mb-1 flex justify-between">
                    <span>全局进度 (共享存档)</span>
                    <span class="text-yellow-400 text-xs px-2 py-0.5 bg-yellow-400/10 rounded-full border border-yellow-400/20 flex items-center gap-1" id="bank-status">
                        <svg class="w-3 h-3 sync-spin hidden" id="sync-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
                        <span id="bank-status-text">准备同步...</span>
                    </span>
                </h2>
                <div class="flex items-end gap-2 mb-4 mt-2">
                    <span class="text-5xl font-black text-white" id="home-answered-count">0</span>
                    <span class="text-lg text-red-200 font-medium mb-1">/ <span id="home-total-count">0</span> 题</span>
                </div>
                <div class="w-full bg-red-900 rounded-full h-2.5 mb-2 border border-red-800">
                  <div id="home-progress-bar" class="bg-yellow-400 h-2.5 rounded-full transition-all duration-700 ease-out shadow-[0_0_10px_rgba(250,204,21,0.5)]" style="width: 0%"></div>
                </div>
            </div>

            <div class="flex flex-col gap-4 mb-8 relative z-10">
                <!-- 顺序模式 -->
                <button onclick="startQuiz('sequential')" class="w-full bg-white border border-slate-200 p-4 rounded-2xl shadow-sm hover:shadow-md active:scale-95 transition-all flex items-center justify-between group">
                    <div class="flex items-center gap-4">
                        <div class="w-12 h-12 bg-red-50 text-red-600 rounded-xl flex items-center justify-center group-hover:bg-red-600 group-hover:text-white transition-colors">
                            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 4h13M3 8h9m-9 4h6m4 0l4-4m0 0l4 4m-4-4v12"></path></svg>
                        </div>
                        <div class="text-left">
                            <h3 class="font-bold text-slate-800 text-lg">1. 顺序模式</h3>
                            <p class="text-xs text-slate-500">先单选后多选，按顺序消灭题库</p>
                        </div>
                    </div>
                    <svg class="w-5 h-5 text-slate-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>
                </button>

                <!-- 随机模式 -->
                <button onclick="startQuiz('random')" class="w-full bg-white border border-slate-200 p-4 rounded-2xl shadow-sm hover:shadow-md active:scale-95 transition-all flex items-center justify-between group">
                    <div class="flex items-center gap-4">
                        <div class="w-12 h-12 bg-red-50 text-red-600 rounded-xl flex items-center justify-center group-hover:bg-red-600 group-hover:text-white transition-colors">
                            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7h12m0 0l-4-4m4 4l-4 4m0 6H4m0 0l4 4m-4-4l4-4"></path></svg>
                        </div>
                        <div class="text-left">
                            <h3 class="font-bold text-slate-800 text-lg">2. 随机模式</h3>
                            <p class="text-xs text-slate-500">全库打乱，选项打乱，计入总进度</p>
                        </div>
                    </div>
                    <svg class="w-5 h-5 text-slate-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>
                </button>

                <!-- 测试模式 -->
                <div class="w-full bg-white border border-slate-200 p-4 rounded-2xl shadow-sm flex flex-col">
                    <div class="flex items-center justify-between mb-3">
                        <div class="flex items-center gap-4">
                            <div class="w-12 h-12 bg-orange-50 text-orange-500 rounded-xl flex items-center justify-center">
                                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                            </div>
                            <div class="text-left">
                                <h3 class="font-bold text-slate-800 text-lg">3. 模拟测试</h3>
                                <p class="text-xs text-slate-500">先单选后多选，不计入全局进度</p>
                            </div>
                        </div>
                    </div>
                    <div class="flex gap-2 items-stretch mt-1">
                        <div class="flex-1 bg-slate-50 rounded-xl border border-slate-100 flex items-center justify-center px-3">
                            <span class="text-sm text-slate-500 mr-2 font-medium">抽取题量:</span>
                            <input type="number" id="test-count" value="50" class="w-14 text-center text-red-600 font-black text-lg bg-transparent border-b-2 border-red-200 focus:outline-none focus:border-red-600">
                        </div>
                        <button onclick="startQuiz('test')" class="bg-red-600 text-white px-6 py-2.5 rounded-xl font-bold shadow-md hover:bg-red-700 active:scale-95 transition-all">开始</button>
                    </div>
                </div>
            </div>

            <!-- 极度弱化的兜底上传区域 -->
            <div class="mt-auto pt-4 pb-2 text-center relative z-0">
                <label class="cursor-pointer text-[10px] text-slate-400 hover:text-slate-600 transition-colors flex items-center justify-center gap-1 opacity-60">
                    <span>若 GitHub 同步失败，可点击此处手动上传备份</span>
                    <input type="file" id="file-input" class="hidden" accept=".xlsx, .xls, .csv" multiple>
                </label>
            </div>
        </div>

        <!-- 视图 2：答题界面 -->
        <div id="view-quiz" class="flex-1 hidden relative overflow-hidden bg-slate-50">
            <div id="quiz-anim-container" class="w-full h-full p-5 pb-28 overflow-y-auto relative">
                
                <!-- 题目区域 -->
                <div class="mb-6 relative">
                    <!-- 答错次数浮窗 -->
                    <div id="mistake-count-badge" class="absolute top-0 right-0 bg-red-50 text-red-600 border border-red-200 text-[10px] font-black px-2 py-0.5 rounded shadow-sm hidden">
                        历史答错 0 次
                    </div>

                    <div class="flex items-center gap-2 mb-3">
                        <span id="question-type-badge" class="bg-blue-100 text-blue-800 text-xs font-bold px-2.5 py-1 rounded border border-blue-200">单选</span>
                        <span id="question-mode-badge" class="text-slate-400 text-xs font-medium"></span>
                    </div>
                    <h3 id="question-text" class="text-[17px] font-bold leading-relaxed text-slate-800"></h3>
                </div>

                <!-- 选项区域 -->
                <div id="options-container" class="flex flex-col gap-3 mb-6"></div>

            </div>
            
            <!-- 解析区域 -->
            <div id="explanation-container" class="hidden absolute bottom-[72px] left-0 w-full glass-card border-t border-slate-200 p-5 rounded-t-3xl fade-in z-10 max-h-[50vh] overflow-y-auto shadow-[0_-10px_20px_rgba(0,0,0,0.05)]">
                <div class="flex items-center gap-2 mb-2">
                    <span class="font-bold text-slate-500 text-sm">正确答案应当是：</span>
                    <span id="correct-answer-text" class="text-green-600 font-black text-xl"></span>
                </div>
                <div class="text-sm text-slate-600 leading-relaxed mt-2 pt-3 border-t border-slate-200/60">
                    <span class="font-bold text-slate-700 block mb-1 text-xs uppercase tracking-wider">📜 官方解析</span>
                    <div id="explanation-text" class="rich-text-wrapper text-[13px]"></div>
                </div>
            </div>
        </div>

        <!-- 底部操作栏 -->
        <div id="bottom-bar" class="hidden absolute bottom-0 left-0 w-full p-3 bg-white border-t border-slate-200 shadow-[0_-4px_10px_-1px_rgba(0,0,0,0.03)] flex gap-3 z-20">
            <button id="prev-btn" onclick="prevQuestion()" class="w-1/4 bg-slate-50 text-slate-500 border border-slate-200 py-3 rounded-xl font-bold transition-all disabled:opacity-40 active:scale-95 text-sm">
                上一题
            </button>
            <button id="next-btn" onclick="nextQuestion()" disabled class="flex-1 bg-red-800 text-white py-3 rounded-xl font-bold transition-all disabled:opacity-40 shadow-md text-sm">
                请先选择答案
            </button>
        </div>

        <!-- 视图 3：结果统计 -->
        <div id="view-result" class="flex-1 hidden flex-col p-6 items-center justify-center fade-in bg-slate-50">
            <div class="w-24 h-24 bg-green-100 rounded-full flex items-center justify-center mb-6 text-5xl shadow-inner">
                🏆
            </div>
            <h2 class="text-2xl font-black mb-2 text-slate-800">练习完成！</h2>
            
            <div class="bg-white border border-slate-200 rounded-2xl p-6 w-full text-center mb-8 shadow-sm">
                <p class="text-slate-500 mb-2 text-sm font-medium">本次得分 / 抽取题数</p>
                <div class="text-5xl font-black text-slate-800 mb-2"><span id="score-text">0</span> <span class="text-2xl text-slate-400 font-medium">/ <span id="total-text">0</span></span></div>
            </div>

            <button onclick="returnToHome()" class="w-full bg-red-800 text-white py-4 rounded-xl font-bold shadow-lg hover:bg-red-900 active:scale-95 transition-all mb-3 text-lg">
                返回主菜单
            </button>
        </div>

    </div>

    <!-- 二次确认弹窗 -->
    <div id="confirm-modal" class="fixed inset-0 bg-slate-900/40 z-[60] hidden flex-col items-center justify-center fade-in backdrop-blur-sm">
        <div class="bg-white rounded-2xl p-6 w-10/12 max-w-sm shadow-2xl transform transition-all">
            <div class="w-12 h-12 bg-red-50 text-red-500 rounded-full flex items-center justify-center mb-4">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M11 15l-3-3m0 0l3-3m-3 3h8M3 12a9 9 0 1118 0 9 9 0 01-18 0z"></path></svg>
            </div>
            <h3 class="text-lg font-black text-slate-800 mb-2">返回主菜单？</h3>
            <p class="text-slate-500 text-sm mb-6 leading-relaxed">你在“顺序”或“随机”模式下的进度已自动保存。确定要退出当前作答环节吗？</p>
            <div class="flex gap-3">
                <button onclick="closeConfirmModal()" class="flex-1 bg-slate-50 text-slate-600 border border-slate-200 py-3 rounded-xl font-bold transition-all active:scale-95 text-sm">继续做题</button>
                <button onclick="proceedReturnHome()" class="flex-1 bg-red-600 text-white py-3 rounded-xl font-bold shadow-md hover:bg-red-700 active:scale-95 transition-all text-sm">确定退出</button>
            </div>
        </div>
    </div>

    <!-- 设置弹窗 -->
    <div id="settings-modal" class="fixed inset-0 bg-slate-900/40 z-[60] hidden flex-col items-center justify-center fade-in backdrop-blur-sm">
        <div class="bg-white rounded-2xl p-6 w-11/12 max-w-sm shadow-2xl relative">
            <button onclick="closeSettings()" class="absolute top-4 right-4 text-slate-400 hover:text-slate-800 transition-colors"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg></button>
            <h3 class="text-lg font-black text-slate-800 mb-6 flex items-center gap-2">⚙️ 偏好设置</h3>
            
            <div class="mb-5 flex justify-between items-center bg-slate-50 p-4 rounded-xl border border-slate-100">
                <span class="text-sm font-bold text-slate-700">错题移出规则</span>
                <div class="flex items-center text-sm">
                    做对 <input type="number" id="setting-mistake-threshold" class="w-10 text-center border-b-2 border-slate-300 font-black text-slate-800 bg-transparent mx-1 focus:outline-none focus:border-slate-800" value="1"> 次自动删除
                </div>
            </div>

            <button onclick="resetGlobalProgress()" class="w-full bg-red-50 text-red-600 py-3.5 rounded-xl font-bold border border-red-100 hover:bg-red-100 active:scale-95 transition-all text-sm flex items-center justify-center gap-2">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                清空所有答题进度与错题
            </button>
            <p class="text-center text-[10px] text-slate-400 mt-3">一旦清空，所有进度将无法恢复</p>
        </div>
    </div>

    <!-- 提示框 -->
    <div id="toast" class="fixed top-10 left-1/2 transform -translate-x-1/2 bg-slate-800/95 backdrop-blur text-white px-6 py-3 rounded-full shadow-xl opacity-0 pointer-events-none transition-all duration-300 z-50 text-sm font-bold whitespace-nowrap">
        提示信息
    </div>

    <script>
        // ==========================================
        // 核心配置：默认去抓取的同目录文件名
        // ==========================================
        const AUTO_LOAD_EXCEL_FILENAME = 'rudang.xlsx';

        function hashStr(str) {
            let hash = 0;
            for (let i = 0; i < str.length; i++) {
                hash = ((hash << 5) - hash) + str.charCodeAt(i);
                hash = hash & hash;
            }
            return 'q_' + Math.abs(hash).toString(16);
        }

        // --- 移除了题库的永久存储，只保留进度存储 ---
        let appState = {
            answeredIds: [],  
            mistakes: {},     
            settings: { mistakeThreshold: 1 }
        };

        let rawQuestions = []; // 当前运行时的内存题库
        let activeQuestions = [];
        let currentIndex = 0;
        let score = 0;
        let hasAnswered = false;
        let currentMultiSelect = [];
        let isAnimating = false;
        let currentMode = ''; 

        // 页面初始化：强制加载同目录文件
        async function loadState() {
            const savedState = localStorage.getItem('party_exam_state_v1');
            if (savedState) {
                try {
                    const parsedState = JSON.parse(savedState);
                    appState.answeredIds = parsedState.answeredIds || [];
                    appState.mistakes = parsedState.mistakes || {};
                    appState.settings = parsedState.settings || { mistakeThreshold: 1 };
                } catch(e) {}
            }
            
            document.getElementById('setting-mistake-threshold').value = appState.settings.mistakeThreshold || 1;
            
            // 执行网络抓取
            await attemptAutoFetchLocalExcel();
            updateHomeStats();
        }

        function saveState() {
            appState.settings.mistakeThreshold = parseInt(document.getElementById('setting-mistake-threshold').value) || 1;
            localStorage.setItem('party_exam_state_v1', JSON.stringify(appState));
            updateHomeStats();
        }

        function setBankStatus(text, isLoading) {
            document.getElementById('bank-status-text').innerText = text;
            const icon = document.getElementById('sync-icon');
            if (isLoading) {
                icon.classList.remove('hidden');
            } else {
                icon.classList.add('hidden');
            }
        }

        // --- ⭐ GitHub Pages / 本地自动抓取核心逻辑 ---
        async function attemptAutoFetchLocalExcel() {
            // 如果是在本地直接双击打开 (file:// 协议)，浏览器会因为安全策略直接拦截 fetch
            if (window.location.protocol === 'file:') {
                setBankStatus('本地离线受限，请使用网络', false);
                showToast("【安全限制】直接双击打开本地 HTML 无法自动读取 Excel！\n请上传至 GitHub 访问，或点击底部手动选择文件。", 5000);
                return false;
            }

            setBankStatus('正在从同目录拉取题库...', true);
            try {
                // 使用 fetch 拉取文件，禁用缓存确保每次拉的都是最新的
                const response = await fetch(AUTO_LOAD_EXCEL_FILENAME, { cache: 'no-store' }); 
                
                if (!response.ok) {
                    if (response.status === 404) {
                        throw new Error(`未找到 ${AUTO_LOAD_EXCEL_FILENAME} 文件，请检查文件名是否严格一致（区分大小写）`);
                    }
                    throw new Error(`HTTP 状态码: ${response.status}`);
                }
                
                // 转换二进制流给 SheetJS 读取
                const arrayBuffer = await response.arrayBuffer();
                const data = new Uint8Array(arrayBuffer);
                const workbook = XLSX.read(data, {type: 'array', cellStyles: true});
                const parsedQuestions = parseWorkbook(workbook);
                
                if (parsedQuestions.length > 0) {
                    // 排序：保证单选在前
                    parsedQuestions.sort((a, b) => {
                        if (a.type === b.type) return 0;
                        return a.type === 'single' ? -1 : 1;
                    });
                    
                    rawQuestions = parsedQuestions; 
                    setBankStatus('✓ 题库同步成功', false);
                    showToast(`题库自动加载成功！共载入 ${parsedQuestions.length} 道题目`);
                    return true;
                } else {
                    throw new Error("表格内部解析为空，请检查是否有数据或表头");
                }
            } catch (error) {
                console.warn("自动加载失败: ", error);
                setBankStatus('拉取失败: ' + error.message, false);
                showToast("自动拉取题库出错：" + error.message, 4500);
                return false;
            }
        }

        function resetGlobalProgress() {
            if (confirm("这会清空你的刷题进度和错题本。确定要清空吗？")) {
                appState.answeredIds = [];
                appState.mistakes = {};
                saveState();
                closeSettings();
                showToast("进度和错题已成功清空！");
            }
        }

        function updateHomeStats() {
            const total = rawQuestions.length;
            const answered = appState.answeredIds.length;
            document.getElementById('home-total-count').innerText = total;
            document.getElementById('home-answered-count').innerText = answered;
            
            let pct = total > 0 ? (answered / total) * 100 : 0;
            document.getElementById('home-progress-bar').style.width = `${pct}%`;
            
            const mistakeCount = Object.keys(appState.mistakes).length;
            const badge = document.getElementById('mistake-badge');
            if (mistakeCount > 0) {
                badge.innerText = mistakeCount > 99 ? '99+' : mistakeCount;
                badge.classList.remove('hidden');
            } else {
                badge.classList.add('hidden');
            }
        }

        document.addEventListener('DOMContentLoaded', loadState);

        // --- 工具函数 ---
        function showToast(msg, duration = 2500) {
            const toast = document.getElementById('toast');
            toast.innerText = msg;
            toast.style.opacity = 1;
            toast.style.transform = 'translate(-50%, 10px)';
            setTimeout(() => {
                toast.style.opacity = 0;
                toast.style.transform = 'translate(-50%, 0)';
            }, duration);
        }

        function shuffleArray(array) {
            let arr = [...array];
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        }

        // --- 视图切换 ---
        function switchView(viewId) {
            ['view-home', 'view-quiz', 'view-result', 'bottom-bar', 'header-stats', 'btn-back'].forEach(id => {
                document.getElementById(id).classList.add('hidden');
            });
            
            document.getElementById(viewId).classList.remove('hidden');
            
            if(viewId === 'view-quiz') {
                document.getElementById('bottom-bar').classList.remove('hidden');
                document.getElementById('header-stats').classList.remove('hidden');
                document.getElementById('btn-back').classList.remove('hidden');
            }
        }

        function confirmReturnHome() {
            document.getElementById('confirm-modal').classList.remove('hidden');
            document.getElementById('confirm-modal').classList.add('flex');
        }

        function closeConfirmModal() {
            document.getElementById('confirm-modal').classList.add('hidden');
            document.getElementById('confirm-modal').classList.remove('flex');
        }

        function proceedReturnHome() {
            closeConfirmModal();
            returnToHome();
        }

        function returnToHome() {
            saveState(); 
            switchView('view-home');
        }

        // --- 设置中心 ---
        function openSettings() {
            document.getElementById('settings-modal').classList.remove('hidden');
            document.getElementById('settings-modal').classList.add('flex');
        }
        function closeSettings() {
            document.getElementById('settings-modal').classList.add('hidden');
            document.getElementById('settings-modal').classList.remove('flex');
            saveState();
        }

        // --- 开始刷题 ---
        function startQuiz(mode) {
            currentMode = mode;
            let pool = [];

            if (rawQuestions.length === 0) { 
                showToast("当前题库为空！请检查自动同步状态或手动导入", 3000);
                return;
            }

            if (mode === 'mistakes') {
                pool = Object.values(appState.mistakes);
                if (pool.length === 0) {
                    showToast("太棒了，目前你的错题本是空的！"); return;
                }
                activeQuestions = shuffleArray(pool);
                document.getElementById('question-mode-badge').innerText = '错题本挑战';
            } 
            else if (mode === 'test') {
                let testCount = parseInt(document.getElementById('test-count').value) || 50;
                if(testCount <= 0) testCount = 50;
                
                let shuf = shuffleArray(rawQuestions); 
                activeQuestions = shuf.slice(0, testCount);
                // 排序：保证先单选后多选
                activeQuestions.sort((a, b) => {
                    if (a.type === b.type) return 0;
                    return a.type === 'single' ? -1 : 1;
                });
                
                document.getElementById('question-mode-badge').innerText = `模拟测试 (${activeQuestions.length}题)`;
            }
            else {
                // 顺序 或 随机
                pool = rawQuestions.filter(q => !appState.answeredIds.includes(q.id));
                if (pool.length === 0) {
                    showToast("恭喜，你已经刷完题库里的所有题目了！"); return;
                }

                if (mode === 'sequential') {
                    activeQuestions = pool; 
                    document.getElementById('question-mode-badge').innerText = '顺序模式';
                } else if (mode === 'random') {
                    activeQuestions = shuffleArray(pool);
                    document.getElementById('question-mode-badge').innerText = '随机模式';
                }
            }

            // 选项全部打乱，增强记忆，同时保证正确答案自动追踪
            activeQuestions = activeQuestions.map(q => ({ ...q, options: shuffleArray(q.options) }));

            currentIndex = 0;
            score = 0;
            document.getElementById('quiz-anim-container').className = "w-full h-full p-5 pb-28 overflow-y-auto relative";
            document.getElementById('explanation-container').classList.add('hidden');
            
            switchView('view-quiz');
            renderQuestion();
        }

        // --- 渲染题目 ---
        function renderQuestion() {
            hasAnswered = false;
            currentMultiSelect = []; 
            document.getElementById('explanation-container').classList.add('hidden');
            
            const q = activeQuestions[currentIndex];
            document.getElementById('header-progress').innerText = `${currentIndex + 1} / ${activeQuestions.length}`;

            // 答错次数展示
            const badgeObj = document.getElementById('mistake-count-badge');
            if (appState.mistakes[q.id]) {
                badgeObj.innerText = `历史答错 ${appState.mistakes[q.id].wrongCount} 次`;
                badgeObj.classList.remove('hidden');
            } else {
                badgeObj.classList.add('hidden');
            }

            const typeBadge = document.getElementById('question-type-badge');
            if (q.type === 'multiple') {
                typeBadge.innerText = '多选';
                typeBadge.className = 'bg-orange-100 text-orange-700 text-[11px] font-black px-2 py-0.5 rounded border border-orange-200 tracking-wider';
            } else {
                typeBadge.innerText = '单选';
                typeBadge.className = 'bg-blue-100 text-blue-700 text-[11px] font-black px-2 py-0.5 rounded border border-blue-200 tracking-wider';
            }

            document.getElementById('question-text').innerText = `${currentIndex + 1}. ${q.question}`;

            const optionsContainer = document.getElementById('options-container');
            optionsContainer.innerHTML = '';
            const labels = ['A', 'B', 'C', 'D', 'E', 'F', 'G', 'H'];

            q.options.forEach((opt, index) => {
                const optEl = document.createElement('div');
                optEl.className = `option-item border-2 border-slate-200 rounded-xl p-4 flex items-start gap-3 cursor-pointer transition-all hover:bg-slate-100 active:scale-[0.98] bg-white`;
                optEl.onclick = () => handleOptionClick(optEl, opt, q);
                
                optEl.innerHTML = `
                    <div class="option-label w-7 h-7 flex-shrink-0 flex items-center justify-center rounded-full border-2 border-slate-200 text-slate-500 font-bold text-sm transition-colors bg-slate-50">
                        ${labels[index]}
                    </div>
                    <div class="pt-0.5 text-slate-700 leading-snug font-medium text-[15px]">
                        ${opt.text}
                    </div>
                `;
                optionsContainer.appendChild(optEl);
            });

            const unsureEl = document.createElement('div');
            unsureEl.className = `unsure-btn option-item border-2 border-dashed border-slate-200 rounded-xl p-4 flex items-center justify-center cursor-pointer transition-all hover:bg-slate-100 active:scale-[0.98] bg-transparent mt-2`;
            unsureEl.onclick = () => submitAnswer(true);
            unsureEl.innerHTML = `<span class="text-slate-400 font-bold text-sm">🤔 不确定，直接看解析</span>`;
            optionsContainer.appendChild(unsureEl);

            const prevBtn = document.getElementById('prev-btn');
            const nextBtn = document.getElementById('next-btn');

            prevBtn.disabled = currentIndex === 0;

            nextBtn.disabled = true;
            nextBtn.innerText = '请先选择答案';
            nextBtn.className = 'flex-1 bg-slate-200 text-slate-400 py-3 rounded-xl font-bold transition-all disabled:opacity-100 text-sm';
            nextBtn.onclick = () => nextQuestion(false); 
        }

        // --- 选项交互 ---
        function handleOptionClick(selectedEl, selectedOpt, currentQuestionObj) {
            if (hasAnswered || isAnimating) return;

            if (currentQuestionObj.type === 'single') {
                submitAnswer(false, [selectedOpt]);
            } else {
                const idx = currentMultiSelect.findIndex(o => o.text === selectedOpt.text);
                if (idx > -1) {
                    currentMultiSelect.splice(idx, 1);
                    selectedEl.classList.remove('border-red-800', 'bg-red-50');
                    selectedEl.classList.add('border-slate-200', 'bg-white');
                    selectedEl.querySelector('.option-label').classList.remove('bg-red-800', 'text-white', 'border-red-800');
                    selectedEl.querySelector('.option-label').classList.add('text-slate-500', 'border-slate-200', 'bg-slate-50');
                } else {
                    currentMultiSelect.push(selectedOpt);
                    selectedEl.classList.remove('border-slate-200', 'bg-white');
                    selectedEl.classList.add('border-red-800', 'bg-red-50');
                    selectedEl.querySelector('.option-label').classList.remove('text-slate-500', 'border-slate-200', 'bg-slate-50');
                    selectedEl.querySelector('.option-label').classList.add('bg-red-800', 'text-white', 'border-red-800');
                }

                const nextBtn = document.getElementById('next-btn');
                if (currentMultiSelect.length > 0) {
                    nextBtn.disabled = false;
                    nextBtn.innerText = '确认选择';
                    nextBtn.className = 'flex-1 bg-red-800 text-white py-3 rounded-xl font-bold shadow-lg active:scale-95 transition-all text-sm tracking-wider';
                    nextBtn.onclick = () => submitAnswer(false, currentMultiSelect);
                } else {
                    nextBtn.disabled = true;
                    nextBtn.innerText = '请先选择答案';
                    nextBtn.className = 'flex-1 bg-slate-200 text-slate-400 py-3 rounded-xl font-bold transition-all disabled:opacity-100 text-sm';
                    nextBtn.onclick = () => nextQuestion(false);
                }
            }
        }

        // --- 提交校验 ---
        function submitAnswer(isUnsure, selectedOpts = []) {
            if (hasAnswered || isAnimating) return;
            hasAnswered = true;

            const q = activeQuestions[currentIndex];
            let isCorrect = false;

            if (!isUnsure) {
                if (q.type === 'single') {
                    isCorrect = selectedOpts[0] && q.correctTexts.includes(selectedOpts[0].text);
                } else {
                    if (selectedOpts.length === q.correctTexts.length) {
                        isCorrect = selectedOpts.every(opt => q.correctTexts.includes(opt.text));
                    }
                }
            }

            // 无论对错，顺序/随机模式都记录已答
            if (currentMode === 'sequential' || currentMode === 'random') {
                if (!appState.answeredIds.includes(q.id)) {
                    appState.answeredIds.push(q.id);
                }
            }

            if (isCorrect) {
                score++;
                
                if (appState.mistakes[q.id]) {
                    appState.mistakes[q.id].correctCount = (appState.mistakes[q.id].correctCount || 0) + 1;
                    let threshold = parseInt(appState.settings.mistakeThreshold) || 1;
                    if (appState.mistakes[q.id].correctCount >= threshold) {
                        delete appState.mistakes[q.id];
                        showToast(`已答对 ${threshold} 次，自动移出错题本`);
                    }
                }
                saveState(); 
                nextQuestion(true); 
                return;
            } else {
                if (!appState.mistakes[q.id]) {
                    appState.mistakes[q.id] = { ...q, wrongCount: 0, correctCount: 0 };
                }
                appState.mistakes[q.id].wrongCount++;
                appState.mistakes[q.id].correctCount = 0; 
                saveState();
            }

            // ====== 动态计算乱序后的正确答案字母映射 ======
            let correctLetters = [];
            const labels = ['A', 'B', 'C', 'D', 'E', 'F', 'G', 'H'];
            q.options.forEach((opt, index) => {
                if (q.correctTexts.includes(opt.text)) correctLetters.push(labels[index]);
            });

            const allOptions = document.querySelectorAll('.option-item:not(.unsure-btn)');
            const selectedTexts = selectedOpts.map(o => o.text);
            
            allOptions.forEach((el, index) => {
                el.classList.remove('hover:bg-slate-100', 'cursor-pointer', 'active:scale-[0.98]', 'border-red-800', 'bg-red-50');
                const optText = q.options[index].text;
                const label = el.querySelector('.option-label');
                label.classList.remove('bg-red-800', 'text-white', 'border-red-800'); 
                
                const isOptCorrect = q.correctTexts.includes(optText);
                const isOptSelected = selectedTexts.includes(optText);
                
                if (isOptCorrect) {
                    el.classList.remove('border-slate-200', 'bg-white', 'border-red-500', 'bg-red-50');
                    el.classList.add('border-green-500', 'bg-green-50/50');
                    label.classList.remove('border-slate-200', 'text-slate-500', 'border-red-500');
                    label.classList.add('bg-green-500', 'text-white', 'border-green-500');
                    label.innerHTML = `<svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg>`;
                } else if (isOptSelected && !isOptCorrect) {
                    el.classList.remove('border-slate-200', 'bg-white');
                    el.classList.add('border-red-500', 'bg-red-50/50');
                    label.classList.remove('border-slate-200', 'text-slate-500');
                    label.classList.add('bg-red-500', 'text-white', 'border-red-500');
                    label.innerHTML = `<svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M6 18L18 6M6 6l12 12"></path></svg>`;
                } else {
                    el.classList.add('opacity-40');
                }
            });

            const unsureEl = document.querySelector('.unsure-btn');
            if (isUnsure) {
                unsureEl.classList.replace('border-slate-200', 'border-orange-400');
                unsureEl.classList.replace('bg-transparent', 'bg-orange-50');
                unsureEl.querySelector('span').classList.replace('text-slate-400', 'text-orange-500');
            } else {
                unsureEl.classList.add('hidden');
            }

            document.getElementById('correct-answer-text').innerText = correctLetters.join(', ');
            document.getElementById('explanation-text').innerHTML = q.explanationHTML;

            const nextBtn = document.getElementById('next-btn');
            document.getElementById('explanation-container').classList.remove('hidden');
            nextBtn.disabled = false;
            nextBtn.onclick = () => nextQuestion(false); 
            
            if (currentIndex === activeQuestions.length - 1) {
                nextBtn.innerText = '查看成绩';
                nextBtn.className = 'flex-1 bg-green-500 text-white py-3 rounded-xl font-bold shadow-lg hover:bg-green-600 active:scale-95 transition-all text-sm tracking-wider';
            } else {
                nextBtn.innerText = '下一题';
                nextBtn.className = 'flex-1 bg-red-800 text-white py-3 rounded-xl font-bold shadow-lg hover:bg-red-900 active:scale-95 transition-all text-sm tracking-wider';
            }
        }

        // --- 动画跳转 ---
        function triggerTransition(outClass, inClass, actionFn) {
            if (isAnimating) return;
            isAnimating = true;

            const container = document.getElementById('quiz-anim-container');
            container.classList.add(outClass);

            setTimeout(() => {
                actionFn();
                container.scrollTo({ top: 0 });
                container.className = 'w-full h-full p-5 pb-28 overflow-y-auto relative ' + inClass;

                setTimeout(() => {
                    container.classList.remove(inClass);
                    isAnimating = false;
                }, 300);

            }, 250); 
        }

        function nextQuestion(isCorrectTransition = false) {
            if (!hasAnswered || isAnimating) return;
            if (currentIndex < activeQuestions.length - 1) {
                const outAnim = isCorrectTransition ? 'slide-out-tl' : 'slide-out-left';
                const inAnim = isCorrectTransition ? 'slide-in-br' : 'slide-in-right';
                triggerTransition(outAnim, inAnim, () => {
                    currentIndex++;
                    renderQuestion();
                });
            } else {
                showResult();
            }
        }

        function prevQuestion() {
            if (currentIndex > 0 && !isAnimating) {
                triggerTransition('slide-out-right', 'slide-in-left', () => {
                    currentIndex--;
                    renderQuestion(); 
                });
            }
        }

        function showResult() {
            saveState(); 
            switchView('view-result');
            document.getElementById('score-text').innerText = score;
            document.getElementById('total-text').innerText = activeQuestions.length;
        }

        // --- EXCEL/CSV 手动解析模块 (作为网络错误的兜底) ---
        const fileInput = document.getElementById('file-input');
        fileInput.addEventListener('change', function(e) {
            const files = e.target.files;
            if (!files || files.length === 0) return;

            showToast("正在读取并加载本地文件...");
            let parsedAll = [];
            let filesProcessed = 0;

            for (let i = 0; i < files.length; i++) {
                const reader = new FileReader();
                reader.onload = function(evt) {
                    try {
                        const data = new Uint8Array(evt.target.result);
                        const workbook = XLSX.read(data, {type: 'array', cellStyles: true});
                        parsedAll = parsedAll.concat(parseWorkbook(workbook));
                    } catch (error) {
                        console.error(error);
                    }
                    
                    filesProcessed++;
                    if (filesProcessed === files.length) {
                        finalizeImport(parsedAll);
                    }
                };
                reader.readAsArrayBuffer(files[i]);
            }
        });

        function parseWorkbook(workbook) {
            let parsed = [];
            workbook.SheetNames.forEach(sheetName => {
                const sheet = workbook.Sheets[sheetName];
                let qType = sheetName.includes('多') ? 'multiple' : 'single';
                const range = XLSX.utils.decode_range(sheet['!ref'] || "A1");
                if (range.s.c === range.e.c && range.s.r === range.e.r) return;

                let headers = {};
                for (let C = range.s.c; C <= range.e.c; ++C) {
                    let cell = sheet[XLSX.utils.encode_cell({r: range.s.r, c: C})];
                    if (cell && cell.v) headers[cell.v.toString().trim()] = C;
                }

                const getColIdx = (names) => {
                    for (let name of names) { if (headers[name] !== undefined) return headers[name]; }
                    return -1;
                };

                const colQ = getColIdx(['题目', '问题', 'Question']);
                const colA = getColIdx(['答案', '正确答案', 'Answer']);
                const colsOpt = [getColIdx(['选项A', 'A']), getColIdx(['选项B', 'B']), getColIdx(['选项C', 'C']), getColIdx(['选项D', 'D']), getColIdx(['选项E', 'E']), getColIdx(['选项F', 'F'])];
                const colExp = getColIdx(['解析', 'Explanation']);

                if (colQ === -1 || colA === -1) return;

                for (let R = range.s.r + 1; R <= range.e.r; ++R) {
                    const getCellVal = (cIdx) => {
                        if (cIdx === -1) return undefined;
                        const cell = sheet[XLSX.utils.encode_cell({r: R, c: cIdx})];
                        return cell ? cell.v : undefined;
                    };

                    const qText = getCellVal(colQ);
                    if (!qText) continue;

                    const ansRaw = (getCellVal(colA) || '').toString().trim().toUpperCase();
                    const ansCodes = ansRaw.match(/[A-F]/g) || [];
                    
                    let options = [];
                    const optLetters = ['A','B','C','D','E','F'];
                    colsOpt.forEach((cIdx, i) => {
                        let val = getCellVal(cIdx);
                        if (val !== undefined) options.push({ code: optLetters[i], text: val.toString() });
                    });

                    let correctTexts = [];
                    ansCodes.forEach(code => {
                        const opt = options.find(o => o.code === code);
                        if (opt) correctTexts.push(opt.text);
                    });

                    let expHTML = '暂无解析';
                    let expVal = getCellVal(colExp); 
                    if (expVal) expHTML = expVal.toString().replace(/\n/g, '<br/>'); 

                    parsed.push({
                        id: hashStr(qText.toString() + qType),
                        type: qType,
                        question: qText.toString(),
                        options: options,
                        correctTexts: correctTexts,
                        explanationHTML: expHTML
                    });
                }
            });
            return parsed;
        }

        function finalizeImport(parsedQuestions) {
            if (parsedQuestions.length === 0) {
                showToast("未读取到有效题目，请检查表格格式"); return;
            }
            
            parsedQuestions.sort((a, b) => {
                if (a.type === b.type) return 0;
                return a.type === 'single' ? -1 : 1;
            });

            rawQuestions = parsedQuestions; 
            updateHomeStats();
            
            setBankStatus('已使用手动上传数据', false);
            showToast(`手动导入成功！共 ${parsedQuestions.length} 道题目`);
            fileInput.value = ''; 
        }

    </script>
