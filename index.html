<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <!-- 适配 iOS 刘海屏及禁止缩放 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <!-- 将网页添加到 iOS 主屏幕时表现为原生 App -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="format-detection" content="telephone=no">
    <title>入党积极分子考试题库</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        body {
            -webkit-tap-highlight-color: transparent;
            -webkit-text-size-adjust: 100%;
            touch-action: manipulation;
            font-family: -apple-system, "PingFang SC", "Microsoft YaHei", BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f9fafb; /* gray-50 */
        }
        .fade-in { animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        .rich-text-wrapper { line-height: 1.6; word-wrap: break-word; }
        .rich-text-wrapper span { line-height: inherit; }

        /* 页面切换动画 */
        .slide-out-tl { animation: slideOutTl 0.3s cubic-bezier(0.4, 0, 0.2, 1) forwards; }
        .slide-in-br { animation: slideInBr 0.3s cubic-bezier(0.4, 0, 0.2, 1) forwards; }
        @keyframes slideOutTl { to { transform: translate(-30%, -30%) scale(0.9); opacity: 0; } }
        @keyframes slideInBr { from { transform: translate(30%, 30%) scale(0.9); opacity: 0; } to { transform: translate(0, 0) scale(1); opacity: 1; } }

        .slide-out-left { animation: slideOutLeft 0.3s cubic-bezier(0.4, 0, 0.2, 1) forwards; }
        .slide-in-right { animation: slideInRight 0.3s cubic-bezier(0.4, 0, 0.2, 1) forwards; }
        @keyframes slideOutLeft { to { transform: translateX(-50%); opacity: 0; } }
        @keyframes slideInRight { from { transform: translateX(50%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

        .slide-out-right { animation: slideOutRight 0.3s cubic-bezier(0.4, 0, 0.2, 1) forwards; }
        .slide-in-left { animation: slideInLeft 0.3s cubic-bezier(0.4, 0, 0.2, 1) forwards; }
        @keyframes slideOutRight { to { transform: translateX(50%); opacity: 0; } }
        @keyframes slideInLeft { from { transform: translateX(-50%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

        .glass-card { background: rgba(255, 255, 255, 0.98); backdrop-filter: blur(12px); box-shadow: 0 -4px 20px -2px rgba(0, 0, 0, 0.05); }
        
        .sync-spin { animation: spin 2s linear infinite; }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        /* 自定义主色调 (参考设计图亮橙色) */
        .brand-bg { background-color: #f97316; } /* orange-500 */
        .brand-text { color: #f97316; }
        .brand-border { border-color: #f97316; }
        .brand-bg-hover:hover { background-color: #ea580c; } /* orange-600 */
        .brand-bg-light { background-color: #fff7ed; } /* orange-50 */
    </style>
</head>
<body class="text-gray-800 h-screen overflow-hidden flex flex-col items-center">

    <!-- 主容器 -->
    <div class="w-full max-w-md h-full bg-white shadow-xl relative flex flex-col no-scrollbar overflow-hidden">
        
        <!-- 头部导航栏 (极简白底风格) -->
        <header class="bg-white text-gray-800 p-4 sticky top-0 z-20 flex justify-between items-center border-b border-gray-100">
            <div class="flex items-center">
                <button id="btn-back" onclick="confirmReturnHome()" class="hidden mr-2 active:scale-95 text-gray-500 hover:text-gray-800 transition-colors p-1">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M15 19l-7-7 7-7"></path></svg>
                </button>
                <h1 class="text-[17px] font-bold tracking-wide">入党积极分子考试题库</h1>
            </div>
            
            <div class="flex items-center gap-3">
                <div id="header-stats" class="hidden text-[11px] font-bold bg-gray-100 text-gray-600 px-3 py-1.5 rounded-full">
                    <span id="header-progress">1/10</span>
                </div>
                <!-- 错题本入口 -->
                <button onclick="startQuiz('mistakes')" class="relative active:scale-95 transition-transform p-1" id="nav-mistake-btn">
                    <svg class="w-6 h-6 text-gray-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"></path></svg>
                    <span id="mistake-badge" class="absolute -top-0.5 -right-0.5 bg-red-500 text-white text-[9px] font-bold w-4 h-4 flex items-center justify-center rounded-full hidden border border-white">0</span>
                </button>
                <!-- 设置入口 -->
                <button onclick="openSettings()" class="active:scale-95 transition-transform p-1">
                    <svg class="w-6 h-6 text-gray-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
                </button>
            </div>
        </header>

        <!-- 视图 1：首页看板 -->
        <div id="view-home" class="flex-1 flex flex-col p-6 overflow-y-auto fade-in bg-gray-50">
            
            <!-- 进度看板 (扁平化轻量设计) -->
            <div class="bg-white rounded-[24px] p-6 shadow-[0_4px_20px_-4px_rgba(0,0,0,0.05)] mb-8 border border-gray-100">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="text-sm font-semibold text-gray-500">全局进度</h2>
                    <span class="text-[10px] font-bold px-2.5 py-1 bg-gray-100 text-gray-500 rounded-full flex items-center gap-1.5" id="bank-status">
                        <svg class="w-3 h-3 sync-spin hidden" id="sync-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
                        <span id="bank-status-text">准备同步...</span>
                    </span>
                </div>
                <div class="flex items-baseline gap-1.5 mb-5">
                    <span class="text-5xl font-black text-gray-800 tracking-tight" id="home-answered-count">0</span>
                    <span class="text-base text-gray-400 font-medium mb-1">/ <span id="home-total-count">0</span> 题</span>
                </div>
                <div class="w-full bg-gray-100 rounded-full h-2">
                  <div id="home-progress-bar" class="brand-bg h-2 rounded-full transition-all duration-700 ease-out" style="width: 0%"></div>
                </div>
            </div>

            <!-- 模式选择区 -->
            <div class="flex flex-col gap-4 relative z-10">
                <!-- 顺序模式 -->
                <button onclick="startQuiz('sequential')" class="w-full bg-white p-5 rounded-[20px] shadow-[0_2px_10px_-4px_rgba(0,0,0,0.05)] border border-gray-100 active:scale-[0.98] transition-all flex items-center justify-between group">
                    <div class="flex items-center gap-4">
                        <div class="w-12 h-12 brand-bg-light brand-text rounded-2xl flex items-center justify-center group-hover:brand-bg group-hover:text-white transition-colors duration-300">
                            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 4h13M3 8h9m-9 4h6m4 0l4-4m0 0l4 4m-4-4v12"></path></svg>
                        </div>
                        <div class="text-left">
                            <h3 class="font-bold text-gray-800 text-base mb-0.5">顺序模式</h3>
                            <p class="text-[12px] text-gray-400">先单选后多选，按顺序消灭题库</p>
                        </div>
                    </div>
                    <svg class="w-5 h-5 text-gray-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>
                </button>

                <!-- 随机模式 -->
                <button onclick="startQuiz('random')" class="w-full bg-white p-5 rounded-[20px] shadow-[0_2px_10px_-4px_rgba(0,0,0,0.05)] border border-gray-100 active:scale-[0.98] transition-all flex items-center justify-between group">
                    <div class="flex items-center gap-4">
                        <div class="w-12 h-12 bg-blue-50 text-blue-500 rounded-2xl flex items-center justify-center group-hover:bg-blue-500 group-hover:text-white transition-colors duration-300">
                            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7h12m0 0l-4-4m4 4l-4 4m0 6H4m0 0l4 4m-4-4l4-4"></path></svg>
                        </div>
                        <div class="text-left">
                            <h3 class="font-bold text-gray-800 text-base mb-0.5">随机模式</h3>
                            <p class="text-[12px] text-gray-400">全库打乱，选项打乱</p>
                        </div>
                    </div>
                    <svg class="w-5 h-5 text-gray-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>
                </button>

                <!-- 测试模式 -->
                <div class="w-full bg-white border border-gray-100 p-5 rounded-[20px] shadow-[0_2px_10px_-4px_rgba(0,0,0,0.05)] flex flex-col mt-2">
                    <div class="flex items-center justify-between mb-4">
                        <div class="flex items-center gap-4">
                            <div class="w-12 h-12 bg-purple-50 text-purple-500 rounded-2xl flex items-center justify-center">
                                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                            </div>
                            <div class="text-left">
                                <h3 class="font-bold text-gray-800 text-base mb-0.5">模拟测试</h3>
                                <p class="text-[12px] text-gray-400">不计入全局进度</p>
                            </div>
                        </div>
                    </div>
                    <div class="flex gap-3 items-center">
                        <div class="flex-1 bg-gray-50 rounded-2xl border border-gray-100 flex items-center justify-center px-4 py-3">
                            <span class="text-xs text-gray-500 mr-2 font-medium">抽取题量:</span>
                            <input type="number" id="test-count" value="50" class="w-14 text-center text-gray-800 font-bold text-base bg-transparent border-b-2 border-gray-200 focus:outline-none focus:border-gray-400 pb-0.5">
                        </div>
                        <button onclick="startQuiz('test')" class="brand-bg brand-bg-hover text-white px-7 py-3.5 rounded-2xl font-bold shadow-md active:scale-95 transition-all text-sm">开始</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- 视图 2：答题界面 -->
        <div id="view-quiz" class="flex-1 hidden relative overflow-hidden bg-gray-50">
            <div id="quiz-anim-container" class="w-full h-full p-6 pb-28 overflow-y-auto relative">
                
                <!-- 题目区域 -->
                <div class="mb-8 relative">
                    <!-- 答错次数浮窗 -->
                    <div id="mistake-count-badge" class="absolute -top-1 right-0 bg-red-50 text-red-500 text-[10px] font-bold px-2.5 py-1 rounded-full hidden">
                        历史答错 0 次
                    </div>

                    <div class="flex items-center gap-2 mb-4">
                        <span id="question-type-badge" class="bg-gray-200 text-gray-600 text-[11px] font-bold px-2.5 py-1 rounded-md tracking-wider">单选</span>
                        <span id="question-mode-badge" class="text-gray-400 text-xs font-medium"></span>
                    </div>
                    <h3 id="question-text" class="text-[18px] font-semibold leading-relaxed text-gray-800 tracking-wide"></h3>
                </div>

                <!-- 选项区域 (浅色大圆角风格) -->
                <div id="options-container" class="flex flex-col gap-3.5 mb-6"></div>

            </div>
            
            <!-- 解析区域 -->
            <div id="explanation-container" class="hidden absolute bottom-[76px] left-0 w-full glass-card border-t border-gray-100 px-6 pb-6 pt-2 rounded-t-[32px] fade-in z-10 max-h-[60vh] flex flex-col">
                <!-- 下滑拖拽控制条 -->
                <div id="drag-header" class="w-full flex justify-center py-3 shrink-0 cursor-grab active:cursor-grabbing">
                    <div class="w-12 h-1.5 bg-gray-300 rounded-full"></div>
                </div>
                <!-- 滚动内容区 -->
                <div class="overflow-y-auto flex-1 no-scrollbar pb-2">
                    <div class="flex flex-col items-center justify-center bg-gray-50 rounded-2xl py-4 mb-4">
                        <span class="font-medium text-gray-500 text-xs mb-1">正确答案应当是</span>
                        <span id="correct-answer-text" class="text-green-500 font-black text-2xl tracking-widest"></span>
                    </div>
                    <div class="text-sm text-gray-600 leading-relaxed">
                        <span class="font-bold text-gray-800 block mb-2 text-xs uppercase tracking-wider">📜 官方解析</span>
                        <div id="explanation-text" class="rich-text-wrapper text-[14px]"></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 底部操作栏 (悬浮风格) -->
        <div id="bottom-bar" class="hidden absolute bottom-0 left-0 w-full px-5 py-4 bg-white border-t border-gray-100 flex gap-3 z-20">
            <button id="prev-btn" onclick="prevQuestion()" class="w-[80px] bg-gray-100 text-gray-600 rounded-[18px] font-bold transition-all disabled:opacity-50 active:scale-95 text-sm flex items-center justify-center shrink-0">
                上一题
            </button>
            <button id="next-btn" onclick="nextQuestion()" disabled class="flex-1 brand-bg text-white py-4 rounded-[18px] font-bold transition-all disabled:bg-gray-200 disabled:text-gray-400 active:scale-[0.98] text-[15px]">
                请先选择答案
            </button>
        </div>

        <!-- 视图 3：结果统计 -->
        <div id="view-result" class="flex-1 hidden flex-col p-6 items-center justify-center fade-in bg-white">
            <div class="w-28 h-28 brand-bg-light text-brand-text rounded-full flex items-center justify-center mb-6 shadow-inner">
                <svg class="w-14 h-14" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
            </div>
            <h2 class="text-2xl font-bold mb-8 text-gray-800">练习完成</h2>
            
            <div class="w-full text-center mb-12">
                <p class="text-gray-400 mb-2 text-sm font-medium">本次得分 / 抽取题数</p>
                <div class="text-6xl font-black text-gray-800 mb-2"><span id="score-text">0</span> <span class="text-3xl text-gray-300 font-medium">/ <span id="total-text">0</span></span></div>
            </div>

            <button onclick="returnToHome()" class="w-full brand-bg brand-bg-hover text-white py-4 rounded-[20px] font-bold active:scale-[0.98] transition-all text-base shadow-lg shadow-orange-500/30">
                返回主菜单
            </button>
        </div>

    </div>

    <!-- 二次确认弹窗 (无边框轻量设计) -->
    <div id="confirm-modal" class="fixed inset-0 bg-gray-900/40 z-[60] hidden flex-col items-center justify-center fade-in backdrop-blur-sm">
        <div class="bg-white rounded-[28px] p-7 w-10/12 max-w-sm shadow-2xl transform transition-all text-center">
            <h3 class="text-[19px] font-bold text-gray-800 mb-3">返回主菜单？</h3>
            <p class="text-gray-500 text-sm mb-8 leading-relaxed px-2">当前进度已自动保存。<br>确定要退出当前作答环节吗？</p>
            <div class="flex gap-3">
                <button onclick="closeConfirmModal()" class="flex-1 bg-gray-100 text-gray-600 py-3.5 rounded-[18px] font-bold transition-all active:scale-95 text-sm">继续做题</button>
                <button onclick="proceedReturnHome()" class="flex-1 bg-red-500 text-white py-3.5 rounded-[18px] font-bold shadow-md hover:bg-red-600 active:scale-95 transition-all text-sm">确定退出</button>
            </div>
        </div>
    </div>

    <!-- 设置弹窗 -->
    <div id="settings-modal" class="fixed inset-0 bg-gray-900/40 z-[60] hidden flex-col items-center justify-center fade-in backdrop-blur-sm">
        <div class="bg-white rounded-[28px] p-6 w-11/12 max-w-sm shadow-2xl relative">
            <button onclick="closeSettings()" class="absolute top-5 right-5 text-gray-400 hover:text-gray-800 transition-colors bg-gray-100 p-1.5 rounded-full"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg></button>
            <h3 class="text-lg font-bold text-gray-800 mb-6 px-2">偏好设置</h3>
            
            <div class="mb-5 flex justify-between items-center bg-gray-50 p-4 rounded-[20px] border border-gray-100">
                <span class="text-sm font-semibold text-gray-600">错题移出规则</span>
                <div class="flex items-center text-sm text-gray-500">
                    做对 <input type="number" id="setting-mistake-threshold" class="w-10 text-center border-b-2 border-gray-300 font-bold text-gray-800 bg-transparent mx-1 focus:outline-none focus:border-gray-500" value="1"> 次自动删除
                </div>
            </div>

            <!-- 手动上传备份 -->
            <label class="w-full bg-gray-50 text-gray-600 py-4 rounded-[20px] font-bold border border-gray-100 active:scale-[0.98] transition-all text-sm flex items-center justify-center gap-2 mb-3 cursor-pointer">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"></path></svg>
                手动导入本地题库备份
                <input type="file" id="file-input" class="hidden" accept=".xlsx, .xls, .csv" multiple>
            </label>

            <button onclick="resetGlobalProgress()" class="w-full bg-red-50 text-red-500 py-4 rounded-[20px] font-bold active:scale-[0.98] transition-all text-sm flex items-center justify-center gap-2">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                清空所有答题进度与错题
            </button>
        </div>
    </div>

    <!-- 提示框 -->
    <div id="toast" class="fixed top-12 left-1/2 transform -translate-x-1/2 bg-gray-800/95 backdrop-blur text-white px-5 py-3 rounded-full shadow-lg opacity-0 pointer-events-none transition-all duration-300 z-50 text-[13px] font-medium whitespace-nowrap">
        提示信息
    </div>

    <script>
        // ==========================================
        // 核心配置：默认去抓取的同目录文件名
        // ==========================================
        const AUTO_LOAD_EXCEL_FILENAME = 'rudang.xlsx';

        function hashStr(str) {
            let hash = 0;
            for (let i = 0; i < str.length; i++) {
                hash = ((hash << 5) - hash) + str.charCodeAt(i);
                hash = hash & hash;
            }
            return 'q_' + Math.abs(hash).toString(16);
        }

        let appState = {
            answeredIds: [],  
            mistakes: {},     
            settings: { mistakeThreshold: 1 }
        };

        let rawQuestions = []; 
        let activeQuestions = [];
        let currentIndex = 0;
        let score = 0;
        let hasAnswered = false;
        let currentMultiSelect = [];
        let isAnimating = false;
        let currentMode = ''; 

        async function loadState() {
            const savedState = localStorage.getItem('party_exam_state_v1');
            if (savedState) {
                try {
                    const parsedState = JSON.parse(savedState);
                    appState.answeredIds = parsedState.answeredIds || [];
                    appState.mistakes = parsedState.mistakes || {};
                    appState.settings = parsedState.settings || { mistakeThreshold: 1 };
                } catch(e) {}
            }
            
            document.getElementById('setting-mistake-threshold').value = appState.settings.mistakeThreshold || 1;
            
            await attemptAutoFetchLocalExcel();
            updateHomeStats();
        }

        function saveState() {
            appState.settings.mistakeThreshold = parseInt(document.getElementById('setting-mistake-threshold').value) || 1;
            localStorage.setItem('party_exam_state_v1', JSON.stringify(appState));
            updateHomeStats();
        }

        function setBankStatus(text, isLoading) {
            document.getElementById('bank-status-text').innerText = text;
            const icon = document.getElementById('sync-icon');
            if (isLoading) {
                icon.classList.remove('hidden');
            } else {
                icon.classList.add('hidden');
            }
        }

        async function attemptAutoFetchLocalExcel() {
            if (window.location.protocol === 'file:') {
                setBankStatus('本地离线受限，请使用网络', false);
                showToast("直接双击打开本地 HTML 无法自动读取 Excel！\n请上传至 GitHub 访问，或去设置中手动选择文件。", 4000);
                return false;
            }

            setBankStatus('正在同步题库...', true);
            try {
                const response = await fetch(AUTO_LOAD_EXCEL_FILENAME, { cache: 'no-store' }); 
                
                if (!response.ok) {
                    if (response.status === 404) {
                        throw new Error(`未找到 ${AUTO_LOAD_EXCEL_FILENAME}`);
                    }
                    throw new Error(`HTTP: ${response.status}`);
                }
                
                const arrayBuffer = await response.arrayBuffer();
                const data = new Uint8Array(arrayBuffer);
                const workbook = XLSX.read(data, {type: 'array', cellStyles: true});
                const parsedQuestions = parseWorkbook(workbook);
                
                if (parsedQuestions.length > 0) {
                    parsedQuestions.sort((a, b) => {
                        if (a.type === b.type) return 0;
                        return a.type === 'single' ? -1 : 1;
                    });
                    
                    rawQuestions = parsedQuestions; 
                    setBankStatus('题库同步成功', false);
                    return true;
                } else {
                    throw new Error("表格解析为空");
                }
            } catch (error) {
                console.warn("自动加载失败: ", error);
                setBankStatus('拉取失败', false);
                showToast("题库同步失败：" + error.message, 3000);
                return false;
            }
        }

        function resetGlobalProgress() {
            if (confirm("确定要清空所有刷题进度和错题本吗？")) {
                appState.answeredIds = [];
                appState.mistakes = {};
                saveState();
                closeSettings();
                showToast("进度和错题已成功清空！");
            }
        }

        function updateHomeStats() {
            const total = rawQuestions.length;
            const answered = appState.answeredIds.length;
            document.getElementById('home-total-count').innerText = total;
            document.getElementById('home-answered-count').innerText = answered;
            
            let pct = total > 0 ? (answered / total) * 100 : 0;
            document.getElementById('home-progress-bar').style.width = `${pct}%`;
            
            const mistakeCount = Object.keys(appState.mistakes).length;
            const badge = document.getElementById('mistake-badge');
            if (mistakeCount > 0) {
                badge.innerText = mistakeCount > 99 ? '99+' : mistakeCount;
                badge.classList.remove('hidden');
            } else {
                badge.classList.add('hidden');
            }
        }

        document.addEventListener('DOMContentLoaded', loadState);

        function showToast(msg, duration = 2000) {
            const toast = document.getElementById('toast');
            toast.innerText = msg;
            toast.style.opacity = 1;
            toast.style.transform = 'translate(-50%, 10px)';
            setTimeout(() => {
                toast.style.opacity = 0;
                toast.style.transform = 'translate(-50%, 0)';
            }, duration);
        }

        function shuffleArray(array) {
            let arr = [...array];
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        }

        function switchView(viewId) {
            ['view-home', 'view-quiz', 'view-result', 'bottom-bar', 'header-stats', 'btn-back'].forEach(id => {
                document.getElementById(id).classList.add('hidden');
            });
            
            document.getElementById(viewId).classList.remove('hidden');
            
            if(viewId === 'view-quiz') {
                document.getElementById('bottom-bar').classList.remove('hidden');
                document.getElementById('header-stats').classList.remove('hidden');
                document.getElementById('btn-back').classList.remove('hidden');
            }
        }

        function confirmReturnHome() {
            document.getElementById('confirm-modal').classList.remove('hidden');
            document.getElementById('confirm-modal').classList.add('flex');
        }

        function closeConfirmModal() {
            document.getElementById('confirm-modal').classList.add('hidden');
            document.getElementById('confirm-modal').classList.remove('flex');
        }

        function proceedReturnHome() {
            closeConfirmModal();
            returnToHome();
        }

        function returnToHome() {
            saveState(); 
            switchView('view-home');
        }

        function openSettings() {
            document.getElementById('settings-modal').classList.remove('hidden');
            document.getElementById('settings-modal').classList.add('flex');
        }
        function closeSettings() {
            document.getElementById('settings-modal').classList.add('hidden');
            document.getElementById('settings-modal').classList.remove('flex');
            saveState();
        }

        function startQuiz(mode) {
            currentMode = mode;
            let pool = [];

            if (rawQuestions.length === 0) { 
                showToast("题库为空，请先在设置中导入或等待自动同步");
                return;
            }

            if (mode === 'mistakes') {
                pool = Object.values(appState.mistakes);
                if (pool.length === 0) {
                    showToast("错题本为空！"); return;
                }
                activeQuestions = shuffleArray(pool);
                document.getElementById('question-mode-badge').innerText = '错题本挑战';
            } 
            else if (mode === 'test') {
                let testCount = parseInt(document.getElementById('test-count').value) || 50;
                if(testCount <= 0) testCount = 50;
                
                let shuf = shuffleArray(rawQuestions); 
                activeQuestions = shuf.slice(0, testCount);
                activeQuestions.sort((a, b) => {
                    if (a.type === b.type) return 0;
                    return a.type === 'single' ? -1 : 1;
                });
                
                document.getElementById('question-mode-badge').innerText = `模拟测试 (${activeQuestions.length}题)`;
            }
            else {
                pool = rawQuestions.filter(q => !appState.answeredIds.includes(q.id));
                if (pool.length === 0) {
                    showToast("恭喜，所有题目已刷完！"); return;
                }

                if (mode === 'sequential') {
                    activeQuestions = pool; 
                    document.getElementById('question-mode-badge').innerText = '顺序模式';
                } else if (mode === 'random') {
                    activeQuestions = shuffleArray(pool);
                    document.getElementById('question-mode-badge').innerText = '随机模式';
                }
            }

            activeQuestions = activeQuestions.map(q => ({ ...q, options: shuffleArray(q.options) }));

            currentIndex = 0;
            score = 0;
            document.getElementById('quiz-anim-container').className = "w-full h-full p-6 pb-28 overflow-y-auto relative";
            document.getElementById('explanation-container').classList.add('hidden');
            
            switchView('view-quiz');
            renderQuestion();
        }

        function renderQuestion() {
            hasAnswered = false;
            currentMultiSelect = []; 
            document.getElementById('explanation-container').classList.add('hidden');
            document.getElementById('quiz-anim-container').style.paddingBottom = ''; // 重置底部 padding
            
            const q = activeQuestions[currentIndex];
            document.getElementById('header-progress').innerText = `${currentIndex + 1} / ${activeQuestions.length}`;

            const badgeObj = document.getElementById('mistake-count-badge');
            if (appState.mistakes[q.id]) {
                badgeObj.innerText = `历史答错 ${appState.mistakes[q.id].wrongCount} 次`;
                badgeObj.classList.remove('hidden');
            } else {
                badgeObj.classList.add('hidden');
            }

            const typeBadge = document.getElementById('question-type-badge');
            if (q.type === 'multiple') {
                typeBadge.innerText = '多选';
                typeBadge.className = 'bg-orange-100 text-orange-600 text-[11px] font-bold px-2 py-0.5 rounded tracking-wider';
            } else {
                typeBadge.innerText = '单选';
                typeBadge.className = 'bg-gray-200 text-gray-600 text-[11px] font-bold px-2 py-0.5 rounded tracking-wider';
            }

            document.getElementById('question-text').innerText = `${currentIndex + 1}. ${q.question}`;

            const optionsContainer = document.getElementById('options-container');
            optionsContainer.innerHTML = '';
            const labels = ['A', 'B', 'C', 'D', 'E', 'F', 'G', 'H'];

            q.options.forEach((opt, index) => {
                const optEl = document.createElement('div');
                optEl.className = `option-item border border-gray-200 rounded-[18px] p-4 flex items-center gap-3.5 cursor-pointer transition-all hover:bg-gray-50 active:scale-[0.98] bg-white`;
                optEl.onclick = () => handleOptionClick(optEl, opt, q);
                
                optEl.innerHTML = `
                    <div class="option-label w-8 h-8 flex-shrink-0 flex items-center justify-center rounded-full bg-gray-50 text-gray-500 font-bold text-[13px] transition-colors">
                        ${labels[index]}
                    </div>
                    <div class="text-gray-700 leading-snug font-medium text-[15px]">
                        ${opt.text}
                    </div>
                `;
                optionsContainer.appendChild(optEl);
            });

            const unsureEl = document.createElement('div');
            unsureEl.className = `unsure-btn option-item border border-dashed border-gray-300 rounded-[18px] p-4 flex items-center justify-center cursor-pointer transition-all hover:bg-gray-100 active:scale-[0.98] bg-transparent mt-1`;
            unsureEl.onclick = () => submitAnswer(true);
            unsureEl.innerHTML = `<span class="text-gray-400 font-semibold text-[13px]">🤔 不确定，直接看解析</span>`;
            optionsContainer.appendChild(unsureEl);

            const prevBtn = document.getElementById('prev-btn');
            const nextBtn = document.getElementById('next-btn');

            prevBtn.disabled = currentIndex === 0;

            nextBtn.disabled = true;
            nextBtn.innerText = '请先选择答案';
            nextBtn.className = 'flex-1 bg-gray-200 text-gray-400 py-4 rounded-[18px] font-bold transition-all disabled:opacity-100 text-[15px]';
            nextBtn.onclick = () => nextQuestion(false); 
        }

        function handleOptionClick(selectedEl, selectedOpt, currentQuestionObj) {
            if (hasAnswered || isAnimating) return;

            if (currentQuestionObj.type === 'single') {
                submitAnswer(false, [selectedOpt]);
            } else {
                const idx = currentMultiSelect.findIndex(o => o.text === selectedOpt.text);
                if (idx > -1) {
                    currentMultiSelect.splice(idx, 1);
                    selectedEl.classList.remove('brand-border', 'brand-bg-light');
                    selectedEl.classList.add('border-gray-200', 'bg-white');
                    selectedEl.querySelector('.option-label').classList.remove('brand-bg', 'text-white');
                    selectedEl.querySelector('.option-label').classList.add('text-gray-500', 'bg-gray-50');
                } else {
                    currentMultiSelect.push(selectedOpt);
                    selectedEl.classList.remove('border-gray-200', 'bg-white');
                    selectedEl.classList.add('brand-border', 'brand-bg-light');
                    selectedEl.querySelector('.option-label').classList.remove('text-gray-500', 'bg-gray-50');
                    selectedEl.querySelector('.option-label').classList.add('brand-bg', 'text-white');
                }

                const nextBtn = document.getElementById('next-btn');
                if (currentMultiSelect.length > 0) {
                    nextBtn.disabled = false;
                    nextBtn.innerText = '确认选择';
                    nextBtn.className = 'flex-1 brand-bg text-white py-4 rounded-[18px] font-bold shadow-md shadow-orange-500/20 active:scale-[0.98] transition-all text-[15px] tracking-wide';
                    nextBtn.onclick = () => submitAnswer(false, currentMultiSelect);
                } else {
                    nextBtn.disabled = true;
                    nextBtn.innerText = '请先选择答案';
                    nextBtn.className = 'flex-1 bg-gray-200 text-gray-400 py-4 rounded-[18px] font-bold transition-all disabled:opacity-100 text-[15px]';
                    nextBtn.onclick = () => nextQuestion(false);
                }
            }
        }

        function submitAnswer(isUnsure, selectedOpts = []) {
            if (hasAnswered || isAnimating) return;
            hasAnswered = true;

            const q = activeQuestions[currentIndex];
            let isCorrect = false;

            if (!isUnsure) {
                if (q.type === 'single') {
                    isCorrect = selectedOpts[0] && q.correctTexts.includes(selectedOpts[0].text);
                } else {
                    if (selectedOpts.length === q.correctTexts.length) {
                        isCorrect = selectedOpts.every(opt => q.correctTexts.includes(opt.text));
                    }
                }
            }

            if (currentMode === 'sequential' || currentMode === 'random') {
                if (!appState.answeredIds.includes(q.id)) {
                    appState.answeredIds.push(q.id);
                }
            }

            if (isCorrect) {
                score++;
                
                if (appState.mistakes[q.id]) {
                    appState.mistakes[q.id].correctCount = (appState.mistakes[q.id].correctCount || 0) + 1;
                    let threshold = parseInt(appState.settings.mistakeThreshold) || 1;
                    if (appState.mistakes[q.id].correctCount >= threshold) {
                        delete appState.mistakes[q.id];
                    }
                }
                saveState(); 
                nextQuestion(true); 
                return;
            } else {
                if (!appState.mistakes[q.id]) {
                    appState.mistakes[q.id] = { ...q, wrongCount: 0, correctCount: 0 };
                }
                appState.mistakes[q.id].wrongCount++;
                appState.mistakes[q.id].correctCount = 0; 
                saveState();
            }

            let correctLetters = [];
            const labels = ['A', 'B', 'C', 'D', 'E', 'F', 'G', 'H'];
            q.options.forEach((opt, index) => {
                if (q.correctTexts.includes(opt.text)) correctLetters.push(labels[index]);
            });

            const allOptions = document.querySelectorAll('.option-item:not(.unsure-btn)');
            const selectedTexts = selectedOpts.map(o => o.text);
            
            allOptions.forEach((el, index) => {
                el.classList.remove('hover:bg-gray-50', 'cursor-pointer', 'active:scale-[0.98]', 'brand-border', 'brand-bg-light');
                const optText = q.options[index].text;
                const label = el.querySelector('.option-label');
                label.classList.remove('brand-bg', 'text-white'); 
                
                const isOptCorrect = q.correctTexts.includes(optText);
                const isOptSelected = selectedTexts.includes(optText);
                
                if (isOptCorrect) {
                    el.classList.remove('border-gray-200', 'bg-white', 'border-red-400', 'bg-red-50');
                    el.classList.add('border-green-400', 'bg-green-50');
                    label.classList.remove('bg-gray-50', 'text-gray-500', 'bg-red-500');
                    label.classList.add('bg-green-500', 'text-white');
                    label.innerHTML = `<svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg>`;
                } else if (isOptSelected && !isOptCorrect) {
                    el.classList.remove('border-gray-200', 'bg-white');
                    el.classList.add('border-red-400', 'bg-red-50');
                    label.classList.remove('bg-gray-50', 'text-gray-500');
                    label.classList.add('bg-red-500', 'text-white');
                    label.innerHTML = `<svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M6 18L18 6M6 6l12 12"></path></svg>`;
                } else {
                    el.classList.add('opacity-40');
                }
            });

            const unsureEl = document.querySelector('.unsure-btn');
            if (isUnsure) {
                unsureEl.classList.replace('border-gray-300', 'border-orange-300');
                unsureEl.classList.replace('bg-transparent', 'brand-bg-light');
                unsureEl.querySelector('span').classList.replace('text-gray-400', 'brand-text');
            } else {
                unsureEl.classList.add('hidden');
            }

            document.getElementById('correct-answer-text').innerText = correctLetters.join(', ');
            document.getElementById('explanation-text').innerHTML = q.explanationHTML;

            const nextBtn = document.getElementById('next-btn');
            const expContainer = document.getElementById('explanation-container');
            document.getElementById('quiz-anim-container').style.paddingBottom = '60vh'; 
            expContainer.style.transform = ''; 
            expContainer.classList.remove('hidden');
            
            nextBtn.disabled = false;
            nextBtn.onclick = () => nextQuestion(false); 
            
            if (currentIndex === activeQuestions.length - 1) {
                nextBtn.innerText = '查看成绩';
                nextBtn.className = 'flex-1 brand-bg text-white py-4 rounded-[18px] font-bold shadow-md active:scale-[0.98] transition-all text-[15px]';
            } else {
                nextBtn.innerText = '下一题';
                nextBtn.className = 'flex-1 bg-gray-800 text-white py-4 rounded-[18px] font-bold shadow-md active:scale-[0.98] transition-all text-[15px]';
            }
            
            setTimeout(() => {
                const container = document.getElementById('quiz-anim-container');
                container.scrollTo({ top: container.scrollHeight, behavior: 'smooth' });
            }, 100);
        }

        // --- 拖拽关闭解析弹窗 ---
        const expContainer = document.getElementById('explanation-container');
        const dragHeader = document.getElementById('drag-header');
        let dragStartY = 0;
        let dragCurrentY = 0;
        let isExpDragging = false;

        dragHeader.addEventListener('touchstart', (e) => {
            dragStartY = e.touches[0].clientY;
            isExpDragging = true;
            expContainer.style.transition = 'none';
        }, {passive: true});

        dragHeader.addEventListener('touchmove', (e) => {
            if (!isExpDragging) return;
            dragCurrentY = e.touches[0].clientY;
            let diffY = dragCurrentY - dragStartY;
            if (diffY > 0) {
                e.preventDefault();
                expContainer.style.transform = `translateY(${diffY}px)`;
            }
        }, {passive: false});

        dragHeader.addEventListener('touchend', () => {
            if (!isExpDragging) return;
            isExpDragging = false;
            let diffY = dragCurrentY - dragStartY;
            expContainer.style.transition = 'transform 0.3s cubic-bezier(0.4, 0, 0.2, 1)';
            if (diffY > 50) {
                hideExplanation();
            } else {
                expContainer.style.transform = `translateY(0)`;
            }
        });

        function hideExplanation() {
            expContainer.style.transform = `translateY(100%)`;
            setTimeout(() => {
                expContainer.classList.add('hidden');
                expContainer.style.transform = '';
                document.getElementById('quiz-anim-container').style.paddingBottom = '';
            }, 300);
        }

        function triggerTransition(outClass, inClass, actionFn) {
            if (isAnimating) return;
            isAnimating = true;

            const container = document.getElementById('quiz-anim-container');
            container.classList.add(outClass);

            setTimeout(() => {
                actionFn();
                container.scrollTo({ top: 0 });
                container.className = 'w-full h-full p-6 pb-28 overflow-y-auto relative ' + inClass;

                setTimeout(() => {
                    container.classList.remove(inClass);
                    isAnimating = false;
                }, 300);

            }, 250); 
        }

        function nextQuestion(isCorrectTransition = false) {
            if (!hasAnswered || isAnimating) return;
            if (currentIndex < activeQuestions.length - 1) {
                const outAnim = isCorrectTransition ? 'slide-out-tl' : 'slide-out-left';
                const inAnim = isCorrectTransition ? 'slide-in-br' : 'slide-in-right';
                triggerTransition(outAnim, inAnim, () => {
                    currentIndex++;
                    renderQuestion();
                });
            } else {
                showResult();
            }
        }

        function prevQuestion() {
            if (currentIndex > 0 && !isAnimating) {
                triggerTransition('slide-out-right', 'slide-in-left', () => {
                    currentIndex--;
                    renderQuestion(); 
                });
            }
        }

        function showResult() {
            saveState(); 
            switchView('view-result');
            document.getElementById('score-text').innerText = score;
            document.getElementById('total-text').innerText = activeQuestions.length;
        }

        // --- EXCEL/CSV 手动解析模块 ---
        const fileInput = document.getElementById('file-input');
        fileInput.addEventListener('change', function(e) {
            const files = e.target.files;
            if (!files || files.length === 0) return;

            showToast("正在读取文件...");
            let parsedAll = [];
            let filesProcessed = 0;

            for (let i = 0; i < files.length; i++) {
                const reader = new FileReader();
                reader.onload = function(evt) {
                    try {
                        const data = new Uint8Array(evt.target.result);
                        const workbook = XLSX.read(data, {type: 'array', cellStyles: true});
                        parsedAll = parsedAll.concat(parseWorkbook(workbook));
                    } catch (error) {
                        console.error(error);
                    }
                    
                    filesProcessed++;
                    if (filesProcessed === files.length) {
                        finalizeImport(parsedAll);
                    }
                };
                reader.readAsArrayBuffer(files[i]);
            }
        });

        function parseWorkbook(workbook) {
            let parsed = [];
            workbook.SheetNames.forEach(sheetName => {
                const sheet = workbook.Sheets[sheetName];
                let qType = sheetName.includes('多') ? 'multiple' : 'single';
                const range = XLSX.utils.decode_range(sheet['!ref'] || "A1");
                if (range.s.c === range.e.c && range.s.r === range.e.r) return;

                let headers = {};
                for (let C = range.s.c; C <= range.e.c; ++C) {
                    let cell = sheet[XLSX.utils.encode_cell({r: range.s.r, c: C})];
                    if (cell && cell.v) headers[cell.v.toString().trim()] = C;
                }

                const getColIdx = (names) => {
                    for (let name of names) { if (headers[name] !== undefined) return headers[name]; }
                    return -1;
                };

                const colQ = getColIdx(['题目', '问题', 'Question']);
                const colA = getColIdx(['答案', '正确答案', 'Answer']);
                const colsOpt = [getColIdx(['选项A', 'A']), getColIdx(['选项B', 'B']), getColIdx(['选项C', 'C']), getColIdx(['选项D', 'D']), getColIdx(['选项E', 'E']), getColIdx(['选项F', 'F'])];
                const colExp = getColIdx(['解析', 'Explanation']);

                if (colQ === -1 || colA === -1) return;

                for (let R = range.s.r + 1; R <= range.e.r; ++R) {
                    const getCellVal = (cIdx) => {
                        if (cIdx === -1) return undefined;
                        const cell = sheet[XLSX.utils.encode_cell({r: R, c: cIdx})];
                        return cell ? cell.v : undefined;
                    };

                    const qText = getCellVal(colQ);
                    if (!qText) continue;

                    const ansRaw = (getCellVal(colA) || '').toString().trim().toUpperCase();
                    const ansCodes = ansRaw.match(/[A-F]/g) || [];
                    
                    let options = [];
                    const optLetters = ['A','B','C','D','E','F'];
                    colsOpt.forEach((cIdx, i) => {
                        let val = getCellVal(cIdx);
                        if (val !== undefined) options.push({ code: optLetters[i], text: val.toString() });
                    });

                    let correctTexts = [];
                    ansCodes.forEach(code => {
                        const opt = options.find(o => o.code === code);
                        if (opt) correctTexts.push(opt.text);
                    });

                    let expHTML = '暂无解析';
                    let expVal = getCellVal(colExp); 
                    if (expVal) expHTML = expVal.toString().replace(/\n/g, '<br/>'); 

                    parsed.push({
                        id: hashStr(qText.toString() + qType),
                        type: qType,
                        question: qText.toString(),
                        options: options,
                        correctTexts: correctTexts,
                        explanationHTML: expHTML
                    });
                }
            });
            return parsed;
        }

        function finalizeImport(parsedQuestions) {
            if (parsedQuestions.length === 0) {
                showToast("未读取到有效题目，请检查表格格式"); return;
            }
            
            parsedQuestions.sort((a, b) => {
                if (a.type === b.type) return 0;
                return a.type === 'single' ? -1 : 1;
            });

            rawQuestions = parsedQuestions; 
            updateHomeStats();
            
            setBankStatus('已加载', false);
            showToast(`成功导入 ${parsedQuestions.length} 道题目`);
            fileInput.value = ''; 
            closeSettings();
        }

    </script>
